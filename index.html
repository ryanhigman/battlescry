<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔮 BattleScry</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1814;--bg2:#211f19;--bg3:#1e1c17;--bg4:#2a2720;--bg5:#252219;--border:#3d3829;--fg:#d6d3cd;--fg2:#a8a28f;--fg3:#7c7766;--fg4:#5c5646;--accent:#fbbf24}
body{background:var(--bg);color:var(--fg);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
input,select,textarea,button{font-family:inherit}
.inp{background:#44403a;border:1px solid #55504a;border-radius:4px;padding:3px 6px;font-size:12px;color:var(--fg);outline:none;width:100%}.inp:focus{border-color:var(--accent)}
.btn{padding:4px 10px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:background .15s}
.btn-p{background:var(--accent);color:#1a1814}.btn-p:hover{background:#e5ab10}
.btn-s{background:#44403a;color:var(--fg)}.btn-s:hover{background:#55504a}
.btn-d{background:#7f1d1d;color:#fca5a5}.btn-d:hover{background:#991b1b}
.lbl{font-size:10px;color:var(--fg2);display:block;margin-bottom:2px}
.sec{background:var(--bg5);border-radius:6px;padding:10px;border:1px solid #33302a;display:flex;flex-direction:column;gap:6px}
.sec-title{font-size:11px;color:var(--fg2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.row{display:flex;gap:4px;align-items:center}
.colors{display:flex;gap:2px;flex-wrap:wrap}
.cswatch{width:16px;height:16px;border-radius:3px;cursor:pointer;border:2px solid transparent}.cswatch.on{border-color:var(--accent)}
#toolbar{border-bottom:1px solid var(--border);padding:5px 8px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;background:var(--bg2);flex-shrink:0}
.logo{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:1px;white-space:nowrap}
.sep{border-left:1px solid var(--border);height:20px;margin:0 1px}
#main{flex:1;display:flex;overflow:hidden}
#map-vp{flex:1;overflow:auto;background:#12100d;position:relative}
#map-container{position:relative;transform-origin:0 0}
#map-container img{position:absolute;pointer-events:none}
#map-container svg{position:absolute}
#sidebar{width:300px;border-left:1px solid var(--border);background:var(--bg3);display:flex;flex-direction:column;flex-shrink:0}
#tabs{display:flex;border-bottom:1px solid var(--border)}
#tabs button{flex:1;padding:7px 2px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;background:transparent;color:var(--fg3);border:none;border-bottom:2px solid transparent;cursor:pointer}
#tabs button.active{background:var(--bg4);color:var(--accent);border-bottom-color:var(--accent)}
#tab-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
#props-area{flex-shrink:0;padding:8px;overflow:auto;max-height:45%}
#list-area{flex:1;overflow:auto;padding:0 8px 8px;display:flex;flex-direction:column;gap:4px}
.obj-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;cursor:pointer;border:1px solid transparent;font-size:11px}
.obj-item.sel{background:#33302a;border-color:var(--accent)}
.obj-item .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.3)}
.obj-item .dot.sq{border-radius:2px}
.obj-item .info{flex:1;min-width:0}.obj-item .name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.obj-item .sub{font-size:9px;font-family:monospace;color:var(--fg3)}.obj-item .sub.moved{color:var(--accent)}
.obj-item .del{background:none;border:none;color:var(--fg3);cursor:pointer;font-size:13px;padding:2px}
.grp-hdr{display:flex;align-items:center;gap:4px;cursor:pointer;padding:4px 0;user-select:none}
.grp-hdr .arrow{font-size:10px;color:var(--fg3);transition:transform .2s}.grp-hdr .arrow.closed{transform:rotate(-90deg)}
#cmd-bar{border-top:1px solid var(--border);padding:6px 8px;background:var(--bg5);flex-shrink:0}
#cmd-bar .cmd{font-family:monospace;font-size:9px;color:var(--fg2);max-height:48px;overflow:auto;word-break:break-all;margin-bottom:4px;line-height:1.4}
.warn{background:#78350f;color:#fbbf24;border-radius:4px;padding:4px 8px;font-size:10px;margin-bottom:4px}
#tooltip{position:fixed;pointer-events:none;background:rgba(0,0,0,.92);color:#fff;font-size:11px;padding:5px 10px;border-radius:5px;font-family:'Segoe UI',sans-serif;z-index:100;display:none;max-width:350px;line-height:1.5}
#popup{position:fixed;background:var(--bg4);border:1px solid var(--accent);border-radius:8px;padding:12px;z-index:200;min-width:220px;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;max-height:400px;overflow:auto}
#popup h3{font-size:12px;color:var(--accent);margin-bottom:8px}
#popup label{display:flex;align-items:center;gap:6px;font-size:12px;padding:3px 0;cursor:pointer}
#popup .actions{display:flex;gap:4px;margin-top:8px;justify-content:flex-end}
</style></head><body>
<div id="toolbar">
  <span class="logo">🔮 BattleScry</span><span style="font-size:9px;color:var(--fg4);margin-left:4px;align-self:flex-end">v0.2.1-beta</span>
  <input id="url-input" class="inp" style="flex:1;min-width:120px;max-width:320px" placeholder="OTFBM URL or image URL…">
  <button id="btn-load" class="btn btn-p">Load</button>
  <button id="btn-revert" class="btn btn-s" style="font-size:10px;padding:3px 6px">⟲ Revert</button>
  <button id="btn-undo" class="btn btn-s" style="font-size:10px;padding:3px 6px">↩ Undo</button>
  <div class="sep"></div>
  <button id="btn-zout" class="btn btn-s">−</button>
  <span id="zoom-lbl" style="font-size:10px;min-width:32px;text-align:center;color:var(--fg2)">100%</span>
  <button id="btn-zin" class="btn btn-s">+</button>
</div>
<div id="main">
  <div id="map-vp"><div id="map-container"><img id="map-img" style="display:none" alt=""><svg id="map-svg" xmlns="http://www.w3.org/2000/svg"></svg></div>
    <div id="placeholder" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--fg4);flex-direction:column;gap:16px;pointer-events:none;padding:20px;text-align:center"><span style="font-size:48px">🗺️</span><span style="font-size:16px">Paste an OTFBM URL <b>or</b> <code>!bscry</code> data string and click Load</span><span style="font-size:12px;color:var(--fg4);max-width:500px">Supports full OTFBM URLs, plain image URLs, or data strings from the !bscry alias</span></div></div>
  <div id="sidebar"><div id="tabs"><button class="active" data-tab="objects">Objects</button><button data-tab="map">Map</button></div><div id="tab-content"><div id="props-area"></div><div id="list-area"></div></div><div id="cmd-bar"><div class="cmd" id="cmd-text" style="color:var(--fg4)">No changes</div><button class="btn btn-p" style="width:100%;font-size:11px" id="btn-copy">Copy Command</button></div></div>
</div>
<div id="tooltip"></div><div id="popup"></div>
<script>
const SIZES={T:{l:"Tiny",c:.5},S:{l:"Small",c:1},M:{l:"Medium",c:1},L:{l:"Large",c:2},H:{l:"Huge",c:3},G:{l:"Gargantuan",c:4}};
const COLORS=[{code:"r",hex:"#e74c3c",n:"Red"},{code:"b",hex:"#3498db",n:"Blue"},{code:"g",hex:"#2ecc71",n:"Green"},{code:"y",hex:"#f1c40f",n:"Yellow"},{code:"p",hex:"#9b59b6",n:"Purple"},{code:"c",hex:"#1abc9c",n:"Cyan"},{code:"w",hex:"#ecf0f1",n:"White"},{code:"bk",hex:"#2c3e50",n:"Black"},{code:"gy",hex:"#95a5a6",n:"Grey"},{code:"o",hex:"#e67e22",n:"Orange"},{code:"pk",hex:"#e91e8a",n:"Pink"},{code:"bn",hex:"#8B4513",n:"Brown"}];
const CC=COLORS.map(c=>c.code).sort((a,b)=>b.length-a.length);const OV_T=["circle","circletop","circlecorner","cone","line","arrow","square","squaretop"];const MAX_MV=16;const PAD=28;
const col2l=n=>{let s="",v=n;while(v>=0){s=String.fromCharCode((v%26)+97)+s;v=Math.floor(v/26)-1;}return s;};
const l2col=s=>{let n=0;for(let i=0;i<s.length;i++)n=n*26+(s.charCodeAt(i)-96);return n-1;};
const fmtC=(c,r)=>`${col2l(c)}${r+1}`;const fmtU=(c,r)=>fmtC(c,r).toUpperCase();
const parseC=s=>{const m=s.match(/^([a-z]+)(\d+)$/i);return m?{col:l2col(m[1].toLowerCase()),row:parseInt(m[2])-1}:null;};
const exC=s=>{const m=s.match(/^([a-z]+)(\d+)/i);return m?{coord:{col:l2col(m[1].toLowerCase()),row:parseInt(m[2])-1},rest:s.slice(m[0].length)}:null;};
function c2h(c){if(!c)return"#3498db";if(c.startsWith("~"))c=c.slice(1);if(/^[0-9a-f]{3}$/i.test(c))return`#${c[0]}${c[0]}${c[1]}${c[1]}${c[2]}${c[2]}`;if(/^[0-9a-f]{6}$/i.test(c))return`#${c}`;if(c.startsWith("#"))return c;return COLORS.find(x=>x.code===c.toLowerCase())?.hex||"#3498db";}
function h2c(h){const f=COLORS.find(c=>c.hex.toLowerCase()===h?.toLowerCase());return f?f.code:h?.startsWith("#")&&h.length===7?h.slice(1):"b";}
function exCol(s){if(s.startsWith("~")){const m=s.match(/^~([0-9a-f]{6}|[0-9a-f]{3})/i);if(m)return{hex:c2h(m[1]),rest:s.slice(m[0].length)};}for(const c of CC)if(s.toLowerCase().startsWith(c))return{hex:c2h(c),rest:s.slice(c.length)};return null;}
let _id=1;const uid=()=>_id++;
function parseOpts(s){const o={cellSize:40,offsetX:0,offsetY:0,dark:false,noGrid:false,gridH:0};s=s.replace(/^@/,"");while(s.length){const c=s[0];if(c==="d"){o.dark=true;s=s.slice(1);}else if("ef".includes(c))s=s.slice(1);else if(c==="n"){o.noGrid=true;s=s.slice(1);}else if(c==="c"){const m=s.match(/^c(\d+)/);if(m){o.cellSize=+m[1];s=s.slice(m[0].length);}else s=s.slice(1);}else if(c==="h"){const m=s.match(/^h(\d+)/);if(m){o.gridH=+m[1];s=s.slice(m[0].length);}else s=s.slice(1);}else if(c==="o"){const m=s.match(/^o(-?\d+):(-?\d+)/);if(m){o.offsetX=+m[1];o.offsetY=+m[2];s=s.slice(m[0].length);}else s=s.slice(1);}else s=s.slice(1);}return o;}
function parseOvSeg(seg){let s=seg,un=false;if(s[0]==="u"){un=true;s=s.slice(1);}let tp=null;if(s.startsWith("co")){tp="circlecorner";s=s.slice(2);}else if(s.startsWith("ct")){tp="circletop";s=s.slice(2);}else if(s[0]==="c"){tp="circle";s=s.slice(1);}else if(s.startsWith("st")){tp="squaretop";s=s.slice(2);}else if(s[0]==="s"){tp="square";s=s.slice(1);}else if(s[0]==="l"){tp="line";s=s.slice(1);}else if(s[0]==="a"){tp="arrow";s=s.slice(1);}else if(s[0]==="t"){tp="cone";s=s.slice(1);}else return null;let sz=0;const nm=s.match(/^(\d+)/);if(nm){sz=+nm[1];s=s.slice(nm[0].length);}let w=5;if(tp==="line"){const wm=s.match(/^,(\d+)/);if(wm){w=+wm[1];s=s.slice(wm[0].length);}if(s[0]===",")s=s.slice(1);}let cl="#e74c3c";const ce=exCol(s);if(ce){cl=ce.hex;s=ce.rest;}let co=null,co2=null;const c1=exC(s);if(c1){co=c1.coord;s=c1.rest;const c2=exC(s);if(c2)co2=c2.coord;}if(!co)return null;return{id:uid(),type:tp,size:sz,width:w,color:cl,coord:co,coord2:co2,under:un,target:""};}
function parseWallSeg(seg){const W=[];for(const p of seg.split("_")){if(!p)continue;const dm=p.match(/^([a-z]+\d+)(-[odbs])([a-z]+\d+)$/i);if(dm){const a=parseC(dm[1]),b=parseC(dm[3]),dt={"-o":"open","-d":"closed","-b":"double","-s":"secret"}[dm[2]];if(a&&b)W.push({id:uid(),start:a,end:b,door:dt,color:"#8B4513"});continue;}let s=p,wc="#8B4513";const cm=s.match(/,([a-z0-9]+)$/i);if(cm){wc=c2h(cm[1]);s=s.slice(0,s.length-cm[0].length);}const pm=s.match(/^([a-z]+\d+)([a-z]+\d+)$/i);if(pm){const a=parseC(pm[1]),b=parseC(pm[2]);if(a&&b)W.push({id:uid(),start:a,end:b,door:null,color:wc});}}return W;}
function parseUrl(url){try{const u=new URL(url);if(!u.hostname.includes("otfbm"))return null;let bg=u.searchParams.get("bg")||"";try{bg=decodeURIComponent(bg)}catch(e){}if(bg.includes("%3A"))try{bg=decodeURIComponent(bg)}catch(e){}const P=u.pathname.split("/").filter(Boolean);let cols=26,rows=26,opts={cellSize:40,offsetX:0,offsetY:0,dark:false,noGrid:false,gridH:0},T=[],O=[],W=[];for(const part of P){const gm=part.match(/^(\d+)x(\d+)/i);if(gm){cols=+gm[1];rows=+gm[2];continue;}if(part[0]==="@"){opts=parseOpts(part);continue;}if(part[0]==="*"){const ov=parseOvSeg(part.slice(1));if(ov)O.push(ov);continue;}if(part[0]==="_"){W.push(...parseWallSeg(part.slice(1)));continue;}if(part.includes(":")&&!part.includes("-"))continue;const di=part.indexOf("-");if(di===-1)continue;const pf=part.slice(0,di),nm=decodeURIComponent(part.slice(di+1));const cm=pf.match(/^([a-z]+)(\d+)/i);if(!cm)continue;const col=l2col(cm[1].toLowerCase()),row=+cm[2]-1;let rest=pf.slice(cm[0].length),sz="M",cl="#3498db";if(rest.length&&/[TSLMHG]/.test(rest[0])){sz=rest[0];rest=rest.slice(1);}const ce=exCol(rest);if(ce)cl=ce.hex;const ti=nm.indexOf("~");T.push({id:uid(),name:ti>-1?nm.slice(0,ti):nm,col,row,size:sz,color:cl,height:0,tokenImage:ti>-1?nm.slice(ti+1):"",originalCol:col,originalRow:row});}
  // Auto-add DM token (hidden, for overlay targeting)
  T.unshift({id:uid(),name:"DM",col:0,row:0,size:"M",color:"#2c3e50",height:0,tokenImage:"",originalCol:0,originalRow:0,hidden:true});
  return{tokens:T,overlays:O,walls:W,opts,bg,cols,rows};}catch(e){return null;}}

// STATE
const S={grid:{cellSize:40,offsetX:0,offsetY:0,cols:26,rows:26},tokens:[],overlays:[],walls:[],sel:{type:null,ids:new Set()},zoom:1,showGrid:true,showOverlays:true,showWalls:true,coordLabels:true,gridOpacity:.45,darkMode:false,loadedUrl:"",tab:"objects",drag:null,marquee:null,tokCol:false,ovCol:false};
let origState=null,undoStack=[];
function snap(){return JSON.parse(JSON.stringify({tokens:S.tokens,overlays:S.overlays,walls:S.walls,grid:S.grid}));}
function pushU(){undoStack.push(snap());if(undoStack.length>30)undoStack.shift();}
function popU(){if(!undoStack.length)return;const s=undoStack.pop();S.tokens=s.tokens;S.overlays=s.overlays;S.walls=s.walls;S.grid=s.grid;clearSel();renderAll();}
function clearSel(){S.sel={type:null,ids:new Set()};}
function isSel(type,id){return (S.sel.type===type||S.sel.type==="mixed")&&S.sel.ids.has(id);}
const $=id=>document.getElementById(id);const NS="http://www.w3.org/2000/svg";
const sEl=(t,a)=>{const e=document.createElementNS(NS,t);for(const[k,v]of Object.entries(a||{}))if(v!=null)e.setAttribute(k,v);return e;};
function renderAll(){renderSVG();renderSB();renderCmd();}
// Resolve overlay coordinate — locked overlays follow their target token
function getOvCoord(ov){
  if(ov.locked&&ov.target){const tok=S.tokens.find(t=>t.name===ov.target);if(tok)return{col:tok.col,row:tok.row};}
  return ov.coord;}
function tokLbl(t,mx){const c=SIZES[t.size]?.c||1;const m=mx||Math.max(2,Math.floor(c*5));return t.name.slice(0,m);}
function groupToks(){const g={};S.tokens.filter(t=>!t.hidden).forEach(t=>{const k=`${t.col},${t.row},${t.size}`;(g[k]=g[k]||[]).push(t);});return g;}
function tokensAt(col,row){return S.tokens.filter(t=>{if(t.hidden)return false;const c=Math.ceil(SIZES[t.size]?.c||1);return col>=t.col&&col<t.col+c&&row>=t.row&&row<t.row+c;});}
function overlaysAt(col,row){return S.overlays.filter(ov=>{if(!ov.coord)return false;return ov.coord.col===col&&ov.coord.row===row;});}
// Center of token in SVG coords
function tokCenter(t){const g=S.grid,cp=SIZES[t.size]?.c||1;return{x:g.offsetX+t.col*g.cellSize+(cp*g.cellSize)/2,y:g.offsetY+t.row*g.cellSize+(cp*g.cellSize)/2};}
function ovCenter(ov){const g=S.grid;if(!ov.coord)return null;return{x:g.offsetX+ov.coord.col*g.cellSize+g.cellSize/2,y:g.offsetY+ov.coord.row*g.cellSize+g.cellSize/2};}

// SVG
function renderSVG(){
  const svg=$("map-svg"),g=S.grid,w=g.cols*g.cellSize,h=g.rows*g.cellSize;
  svg.setAttribute("width",w+PAD*2);svg.setAttribute("height",h+PAD*2);
  svg.setAttribute("viewBox",`${-PAD} ${-PAD} ${w+PAD*2} ${h+PAD*2}`);
  svg.innerHTML="";
  svg.appendChild(sEl("rect",{x:0,y:0,width:w,height:h,fill:"transparent","data-bg":"1"}));
  if(S.showOverlays)S.overlays.filter(o=>o.under).forEach(o=>rOv(svg,o));
  if(S.showGrid){const gg=sEl("g",{opacity:S.gridOpacity});const sc=S.darkMode?"rgba(255,255,255,0.5)":"rgba(0,0,0,0.35)";
    for(let c=0;c<=g.cols;c++){const x=g.offsetX+c*g.cellSize;gg.appendChild(sEl("line",{x1:x,y1:g.offsetY,x2:x,y2:g.offsetY+g.rows*g.cellSize,stroke:sc,"stroke-width":c%5===0?1:.5}));}
    for(let r=0;r<=g.rows;r++){const y=g.offsetY+r*g.cellSize;gg.appendChild(sEl("line",{x1:g.offsetX,y1:y,x2:g.offsetX+g.cols*g.cellSize,y2:y,stroke:sc,"stroke-width":r%5===0?1:.5}));}svg.appendChild(gg);}
  if(S.coordLabels){const fs=Math.max(12,Math.min(18,g.cellSize*.4));const fc=S.darkMode?"rgba(200,180,120,0.9)":"rgba(30,20,5,0.75)";
    for(let c=0;c<g.cols;c++){const t=sEl("text",{x:g.offsetX+c*g.cellSize+g.cellSize/2,y:-7,"text-anchor":"middle","font-size":fs,fill:fc,"font-family":"monospace","font-weight":"bold"});t.textContent=col2l(c).toUpperCase();svg.appendChild(t);}
    for(let r=0;r<g.rows;r++){const t=sEl("text",{x:-6,y:g.offsetY+r*g.cellSize+g.cellSize/2+fs/3,"text-anchor":"end","font-size":fs,fill:fc,"font-family":"monospace","font-weight":"bold"});t.textContent=r+1;svg.appendChild(t);}}
  if(S.showWalls)S.walls.forEach(wl=>rWall(svg,wl));
  const groups=groupToks();
  Object.keys(groups).sort((a,b)=>(SIZES[groups[b][0].size]?.c||1)-(SIZES[groups[a][0].size]?.c||1)).forEach(k=>{const tks=groups[k];if(tks.length===1)rTok(svg,tks[0]);else rPie(svg,tks);});
  if(S.showOverlays)S.overlays.filter(o=>!o.under).forEach(o=>rOv(svg,o));
  // Marquee rect
  if(S.marquee){const m=S.marquee,x=Math.min(m.x1,m.x2),y=Math.min(m.y1,m.y2),mw=Math.abs(m.x2-m.x1),mh=Math.abs(m.y2-m.y1);
    svg.appendChild(sEl("rect",{x,y,width:mw,height:mh,fill:"rgba(251,191,36,0.15)",stroke:"#fbbf24","stroke-width":1,"stroke-dasharray":"4 2","pointer-events":"none"}));}
  // Container sizing
  const ct=$("map-container"),img=$("map-img");
  ct.style.width=(w+PAD*2)*S.zoom+"px";ct.style.height=(h+PAD*2)*S.zoom+"px";
  ct.style.transform=`scale(${S.zoom})`;ct.style.transformOrigin="0 0";
  img.style.left=PAD+"px";img.style.top=PAD+"px";
  if(S.loadedUrl){img.style.display="block";img.style.width=w+"px";img.style.height=h+"px";img.style.objectFit="fill";}
  $("placeholder").style.display=S.loadedUrl?"none":"flex";}

function rTok(svg,t){
  const g=S.grid,cp=SIZES[t.size]?.c||1,r=(cp*g.cellSize)/2-2,p=tokCenter(t);
  const sel=isSel("token",t.id),fs=Math.max(11,Math.min(r*.55,42));
  const gr=sEl("g",{style:"cursor:grab","data-tid":String(t.id)});
  if(sel)gr.appendChild(sEl("circle",{cx:p.x,cy:p.y,r:r+4,fill:"none",stroke:"#fbbf24","stroke-width":3,"stroke-dasharray":"6 3"}));
  gr.appendChild(sEl("circle",{cx:p.x,cy:p.y,r,fill:t.color,"fill-opacity":.9,stroke:"rgba(0,0,0,0.8)","stroke-width":2}));

function ovChanged(ov){if(!origState)return false;const o=origState.overlays.find(x=>x.id===ov.id);if(!o)return true;return ov.size!==o.size||ov.color!==o.color||ov.type!==o.type||ov.under!==o.under||(ov.coord?.col!==o.coord?.col)||(ov.coord?.row!==o.coord?.row)||(ov.coord2?.col!==o.coord2?.col)||(ov.coord2?.row!==o.coord2?.row);}

// Check if cell is within overlay area
// Point-in-triangle test using cross products
function ptInTri(px,py,v1x,v1y,v2x,v2y,v3x,v3y){
  const d1=(px-v2x)*(v1y-v2y)-(v1x-v2x)*(py-v2y);
  const d2=(px-v3x)*(v2y-v3y)-(v2x-v3x)*(py-v3y);
  const d3=(px-v1x)*(v3y-v1y)-(v3x-v1x)*(py-v1y);
  return !((d1<0||d2<0||d3<0)&&(d1>0||d2>0||d3>0));}
function ovCoversCell(ov,col,row){
  const coord=getOvCoord(ov);if(!coord)return false;
  const g=S.grid,cs=g.cellSize,ox=g.offsetX,oy=g.offsetY;
  const cellCx=ox+col*cs+cs/2,cellCy=oy+row*cs+cs/2;
  if(ov.type.startsWith("circle")){
    const p=ov.type==="circle"?{x:ox+coord.col*cs+cs/2,y:oy+coord.row*cs+cs/2}:{x:ox+coord.col*cs,y:oy+coord.row*cs};
    const r=(ov.size/5)*cs;const dx=cellCx-p.x,dy=cellCy-p.y;return Math.sqrt(dx*dx+dy*dy)<=r+cs/2;}
  if(ov.type.startsWith("square")){const px=ox+coord.col*cs,py=oy+coord.row*cs,sz=(ov.size/5)*cs;return cellCx>=px-cs/2&&cellCx<=px+sz+cs/2&&cellCy>=py-cs/2&&cellCy<=py+sz+cs/2;}
  if(ov.type==="cone"&&ov.coord2){
    // Compute cone triangle vertices (same geometry as rendering)
    const sc={x:ox+coord.col*cs+cs/2,y:oy+coord.row*cs+cs/2};
    const ac={x:ox+ov.coord2.col*cs+cs/2,y:oy+ov.coord2.row*cs+cs/2};
    const aimA=Math.atan2(ac.y-sc.y,ac.x-sc.x);
    const snA=Math.round(aimA/(Math.PI/4))*(Math.PI/4);
    const p1x=sc.x+Math.round(Math.cos(snA))*cs/2,p1y=sc.y+Math.round(Math.sin(snA))*cs/2;
    const a=Math.atan2(ac.y-p1y,ac.x-p1x),l=(ov.size/5)*cs;
    const bx=p1x+l*Math.cos(a),by=p1y+l*Math.sin(a),hw=l/2;
    const px=Math.cos(a+Math.PI/2),py=Math.sin(a+Math.PI/2);
    return ptInTri(cellCx,cellCy,p1x,p1y,bx+hw*px,by+hw*py,bx-hw*px,by-hw*py);}
  if(coord.col===col&&coord.row===row)return true;
  if(ov.coord2&&ov.coord2.col===col&&ov.coord2.row===row)return true;
  return false;}
function overlaysAtArea(col,row){return S.overlays.filter(ov=>ovCoversCell(ov,col,row));}

        // Square pivot: center for 'square', topleft for 'squaretop'
        if(ov.type==="square"){const sz=(ov.size/5)*cs;cx=ox+coord.col*cs+sz/2;cy=oy+coord.row*cs+sz/2;}
        if(ov.type==="squaretop"){cx=ox+coord.col*cs;cy=oy+coord.row*cs;}
        S.aimDrag={ovId,cx,cy,cs};renderAll();}return;}
    // 1. Overlay click — check actual clicked cell for multiple objects
    const ovG=e.target.closest("[data-oid]");
    if(ovG){const oid=+ovG.dataset.oid;
      if(isSel("overlay",oid)&&!shift){startDrag(e);return;}
      if(shift){shiftToggle(oid);renderAll();return;}
      // Check the actual clicked CELL for multiple objects
      const pt=svgPt(e),gp=pt2g(pt.x,pt.y);
      const cellToks=tokensAt(gp.col,gp.row);const cellOvs=overlaysAtArea(gp.col,gp.row);
      if(cellToks.length+cellOvs.length>1){
        const items=[...cellToks.map(t=>({...t,_type:"token"})),...cellOvs.map(o=>({...o,_type:"overlay"}))];
        showPopup(e,items,false);return;}
      S.sel={type:"overlay",ids:new Set([oid])};renderAll();return;}
    // 2. Pie chart — if selected tokens in this pie, drag; else popup
    const pieG=e.target.closest("[data-piehit]");
    if(pieG){const ids=pieG.getAttribute("data-piehit").split(",").map(Number);
      const selInPie=ids.filter(id=>isSel("token",id));
      if(selInPie.length>0&&!shift){startDrag(e);return;}
      const toks=S.tokens.filter(t=>ids.includes(t.id));
      const ovs=overlaysAtArea(toks[0].col,toks[0].row);
      const items=[...toks.map(t=>({...t,_type:"token"})),...ovs.map(o=>({...o,_type:"overlay"}))];
      showPopup(e,items,shift);return;}
    // 3. Single token click
    const tg=e.target.closest("[data-tid]");
    if(tg){const tid=+tg.dataset.tid;
      if(shift){shiftToggle(tid);renderAll();return;}
      if(isSel("token",tid)){startDrag(e);return;}
      // Check for other objects at this token's cell — popup if multiple
      const tok=S.tokens.find(t=>t.id===tid);
      if(tok){const cellToks=tokensAt(tok.col,tok.row);const cellOvs=overlaysAtArea(tok.col,tok.row);
        if(cellToks.length+cellOvs.length>1){
          const items=[...cellToks.map(t=>({...t,_type:"token"})),...cellOvs.map(o=>({...o,_type:"overlay"}))];
          showPopup(e,items,false);return;}}
      S.sel={type:"token",ids:new Set([tid])};startDrag(e);return;}
    // 4. Background — popup if multiple, select+drag if single, else marquee
    const pt=svgPt(e),gp=pt2g(pt.x,pt.y);
    const toks=tokensAt(gp.col,gp.row);const ovs=overlaysAtArea(gp.col,gp.row);
    if(toks.length+ovs.length>1){const items=[...toks.map(t=>({...t,_type:"token"})),...ovs.map(o=>({...o,_type:"overlay"}))];showPopup(e,items,shift);return;}
    if(toks.length===1){S.sel={type:"token",ids:new Set([toks[0].id])};startDrag(e);return;}
    if(ovs.length===1){S.sel={type:"overlay",ids:new Set([ovs[0].id])};startDrag(e);return;}
    mStart={x:pt.x-PAD,y:pt.y-PAD,sx:e.clientX,sy:e.clientY};clearSel();renderAll();
  });
  vp.addEventListener("mousemove",e=>{
    // Move start coord - snap to grid cell
    if(S.moveCoord){const pt=svgPt(e);const mx=pt.x-PAD,my=pt.y-PAD;
      const g=S.grid,col=Math.max(0,Math.min(Math.floor((mx-g.offsetX)/g.cellSize),g.cols-1));
      const row=Math.max(0,Math.min(Math.floor((my-g.offsetY)/g.cellSize),g.rows-1));
      const ov=S.overlays.find(o=>o.id===S.moveCoord.ovId);
      if(ov)ov.coord={col,row};
      renderSVG();renderCmd();return;}
    // Aim/rotate drag - aim at grid cell under mouse
    if(S.aimDrag){const pt=svgPt(e);const mx=pt.x-PAD,my=pt.y-PAD;
      const g=S.grid,col=Math.max(0,Math.min(Math.floor((mx-g.offsetX)/g.cellSize),g.cols-1));
      const row=Math.max(0,Math.min(Math.floor((my-g.offsetY)/g.cellSize),g.rows-1));
      const ov=S.overlays.find(o=>o.id===S.aimDrag.ovId);
      if(ov)ov.coord2={col,row};
      renderSVG();renderCmd();return;}
    // Resize overlay
    if(S.resize){const pt=svgPt(e);const dx=pt.x-PAD-S.resize.centerX,dy=pt.y-PAD-S.resize.centerY;
      const dist=S.resize.isSquare?Math.max(Math.abs(dx),Math.abs(dy)):Math.sqrt(dx*dx+dy*dy);
      const newFt=Math.max(5,Math.round(dist/S.resize.ft2px/5)*5);
      const ov=S.overlays.find(o=>o.id===S.resize.ovId);if(ov)ov.size=newFt;
      renderSVG();renderCmd();return;}
    if(S.drag){const pt=svgPt(e),gp=pt2g(pt.x,pt.y);
      S.tokens.forEach(t=>{if(!S.drag.act.has(t.id))return;const o=S.drag.offs[t.id]||{dc:0,dr:0};t.col=Math.max(0,Math.min(gp.col+o.dc,S.grid.cols-1));t.row=Math.max(0,Math.min(gp.row+o.dr,S.grid.rows-1));});
      S.overlays.forEach(o=>{if(!S.drag.ovAct.has(o.id))return;const off=S.drag.ovOffs[o.id];if(!off||!o.coord)return;
        o.coord={col:Math.max(0,Math.min(gp.col+off.dc,S.grid.cols-1)),row:Math.max(0,Math.min(gp.row+off.dr,S.grid.rows-1))};
        if(o.coord2)o.coord2={col:Math.max(0,Math.min(gp.col+off.dc2,S.grid.cols-1)),row:Math.max(0,Math.min(gp.row+off.dr2,S.grid.rows-1))};});
      renderSVG();renderCmd();return;}
    if(mStart){const dx=e.clientX-mStart.sx,dy=e.clientY-mStart.sy;
      if(Math.abs(dx)>3||Math.abs(dy)>3){const pt=svgPt(e);S.marquee={x1:mStart.x,y1:mStart.y,x2:pt.x-PAD,y2:pt.y-PAD};renderSVG();}}
  });
  const endDrag=e=>{
    if(S.moveCoord){S.moveCoord=null;renderAll();return;}
    if(S.aimDrag){S.aimDrag=null;renderAll();return;}
    if(S.resize){S.resize=null;renderAll();return;}
    if(S.drag){S.drag=null;renderSB();return;}
    if(S.marquee){
      // Find objects in marquee
      const mx1=Math.min(S.marquee.x1,S.marquee.x2),my1=Math.min(S.marquee.y1,S.marquee.y2);
      const mx2=Math.max(S.marquee.x1,S.marquee.x2),my2=Math.max(S.marquee.y1,S.marquee.y2);
      const ids=new Set();
      S.tokens.filter(t=>!t.hidden).forEach(t=>{const p=tokCenter(t);if(p.x>=mx1&&p.x<=mx2&&p.y>=my1&&p.y<=my2)ids.add(t.id);});
      if(ids.size)S.sel={type:"token",ids};
      S.marquee=null;renderAll();
    }
    mStart=null;};
  vp.addEventListener("mouseup",endDrag);vp.addEventListener("mouseleave",()=>{if(S.marquee){S.marquee=null;renderSVG();}mStart=null;endDrag();});
  document.addEventListener("keydown",e=>{if((e.key==="Delete"||e.key==="Backspace")&&S.sel.ids.size&&!["INPUT","TEXTAREA","SELECT"].includes(e.target.tagName)){pushU();
    if(S.sel.type==="token"||S.sel.type==="mixed")S.tokens=S.tokens.filter(t=>!S.sel.ids.has(t.id));
    if(S.sel.type==="overlay"||S.sel.type==="mixed")S.overlays=S.overlays.filter(o=>!S.sel.ids.has(o.id));
    clearSel();renderAll();}if(e.ctrlKey&&e.key==="z"){e.preventDefault();popU();}});
  document.addEventListener("mousedown",e=>{const pp=$("popup");if(pp.style.display==="block"&&!pp.contains(e.target)&&Date.now()-ppOpenedAt>300)pp.style.display="none";});
}
function svgPt(e){const r=$("map-svg").getBoundingClientRect();return{x:(e.clientX-r.left)/S.zoom,y:(e.clientY-r.top)/S.zoom};}
function pt2g(x,y){const g=S.grid,px=x-PAD,py=y-PAD;return{col:Math.max(0,Math.min(Math.floor((px-g.offsetX)/g.cellSize),g.cols-1)),row:Math.max(0,Math.min(Math.floor((py-g.offsetY)/g.cellSize),g.rows-1))};}
function loadMap(){let url=$("url-input").value.trim();if(!url)return;
  // Detect hash data string (from !maptool alias)
  if(url.startsWith("#"))url=url.slice(1);
  if(url.startsWith("g=")||url.startsWith("t=")||url.startsWith("o=")||url.startsWith("bg=")){
    loadFromHashStr(url);return;}
  // Normal OTFBM URL or image URL
  const p=parseUrl(url);
  if(p){S.grid={cellSize:p.opts.cellSize||40,offsetX:p.opts.offsetX||0,offsetY:p.opts.offsetY||0,cols:p.cols,rows:p.rows};S.tokens=p.tokens;S.overlays=p.overlays;S.walls=p.walls;
    if(p.opts.dark){S.darkMode=true;document.body.style.background="#0d0c0a";}
    if(p.opts.noGrid)S.showGrid=false;if(p.opts.gridH)S.gridOpacity=p.opts.gridH/100;
    if(p.opts.cellSize>60)S.zoom=Math.max(.25,40/p.opts.cellSize);
    const vpW2=$("map-vp").clientWidth;const mapW2=S.grid.cols*S.grid.cellSize+PAD*2;
    if(vpW2&&mapW2)S.zoom=Math.max(.1,Math.min(3,vpW2/mapW2));
    S.loadedUrl=p.bg||url;$("map-img").src=S.loadedUrl;$("map-img").style.display="block";
  }else{S.loadedUrl=url;$("map-img").src=url;$("map-img").style.display="block";}
  clearSel();origState=snap();undoStack=[];$("zoom-lbl").textContent=Math.round(S.zoom*100)+"%";renderAll();}
// Load from URL hash (from Avrae !maptool alias)
// Shared hash data parser — works from URL hash or pasted string
function loadFromHashStr(hash){
  if(!hash)return;
  const params={};hash.split("&").forEach(p=>{const eq=p.indexOf("=");if(eq<1)return;params[p.slice(0,eq)]=decodeURIComponent(p.slice(eq+1));});
  const hasMap=params.g||params.o||params.bg;
  // Update grid/bg only if provided
  if(params.g){const m=params.g.match(/(\d+)x(\d+)/);if(m){S.grid.cols=+m[1];S.grid.rows=+m[2];}}
  if(params.o){const opts=parseOpts("@"+params.o);S.grid.cellSize=opts.cellSize||40;S.grid.offsetX=opts.offsetX;S.grid.offsetY=opts.offsetY;if(opts.dark){S.darkMode=true;document.body.style.background="#0d0c0a";}if(opts.noGrid)S.showGrid=false;if(opts.gridH)S.gridOpacity=opts.gridH/100;}
  if(params.bg){S.loadedUrl=params.bg;$("map-img").src=params.bg;$("map-img").style.display="block";}
  // Save map defaults when we get grid/bg info
  if(hasMap){try{localStorage.setItem("mapDef",JSON.stringify({g:params.g||"",o:params.o||"",bg:params.bg||""}));}catch(e){}}
  // If no grid/bg, try loading saved defaults
  if(!hasMap&&!S.loadedUrl){try{const sv=JSON.parse(localStorage.getItem("mapDef")||"{}");
    if(sv.g){const m=sv.g.match(/(\d+)x(\d+)/);if(m){S.grid.cols=+m[1];S.grid.rows=+m[2];}}
    if(sv.o){const opts=parseOpts("@"+sv.o);S.grid.cellSize=opts.cellSize||40;S.grid.offsetX=opts.offsetX;S.grid.offsetY=opts.offsetY;if(opts.dark)S.darkMode=true;}
    if(sv.bg){S.loadedUrl=sv.bg;$("map-img").src=sv.bg;$("map-img").style.display="block";}
  }catch(e){}}
  if(S.grid.cellSize>60)S.zoom=Math.max(.25,40/S.grid.cellSize);
  // Auto-zoom to fill viewport width
  const vpW=$("map-vp").clientWidth;
  const mapW=S.grid.cols*S.grid.cellSize+PAD*2;
  if(vpW&&mapW)S.zoom=Math.max(.1,Math.min(3,vpW/mapW));
  $("url-input").value=hasMap?"Loaded map + tokens":mergeMode?"Merged heights/overlays into map":"Loaded tokens"+(S.loadedUrl?" (using saved map)":"");
  // If we already have tokens loaded and this is token-only data, MERGE instead of replace
  const mergeMode=!hasMap&&S.tokens.length>1;
  if(!mergeMode){
    S.tokens=[{id:uid(),name:"DM",col:0,row:0,size:"M",color:"#2c3e50",height:0,tokenImage:"",originalCol:0,originalRow:0,hidden:true}];
    if(params.t){params.t.split(";").forEach(ts=>{
      if(!ts.trim())return;const parts=ts.split("|");if(parts.length<2)return;
      const name=parts[0].replace(/_/g," "),coord=parseC((parts[1]||"").trim());if(!coord)return;
      const size=(parts[2]||"M").trim(),colorCode=(parts[3]||"").trim(),height=+(parts[4]||0);
      S.tokens.push({id:uid(),name,col:coord.col,row:coord.row,size:SIZES[size]?size:"M",color:colorCode?c2h(colorCode):"#3498db",height,tokenImage:"",originalCol:coord.col,originalRow:coord.row});
    });}
  } else {
    // Merge mode: match by name, only update explicitly-set properties
    if(params.t){params.t.split(";").forEach(ts=>{
      if(!ts.trim())return;const parts=ts.split("|");if(parts.length<2)return;
      const name=parts[0].replace(/_/g," ");
      const coord=parseC((parts[1]||"").trim());
      const size=(parts[2]||"").trim();
      const colorCode=(parts[3]||"").trim();
      const height=+(parts[4]||0);
      const existing=S.tokens.find(t=>t.name===name);
      if(existing){
        // Update position
        if(coord){existing.col=coord.col;existing.row=coord.row;existing.originalCol=coord.col;existing.originalRow=coord.row;}
        // Only override size/color if explicitly set in notes (not default "M"/"b")
        if(size&&size!=="M")existing.size=size;
        if(colorCode&&colorCode!=="b")existing.color=c2h(colorCode);
        // Always update height since it's never in the URL
        if(height)existing.height=height;
      } else if(coord){
        // New token not in URL — add it
        S.tokens.push({id:uid(),name,col:coord.col,row:coord.row,size:SIZES[size]?size:"M",color:colorCode?c2h(colorCode):"#e74c3c",height,tokenImage:"",originalCol:coord.col,originalRow:coord.row});
      }
    });}
  }
  S.overlays=[];
  if(params.ov){params.ov.split(";").forEach(os=>{
    if(!os.trim())return;const ti=os.indexOf("~");if(ti===-1)return;
    const target=os.slice(0,ti).replace(/_/g," ");let ovStr=os.slice(ti+1);
    const locked=ovStr.includes("{targ}");
    // Replace {targ} with dummy coord so parser succeeds, then null it out
    ovStr=ovStr.replace(/\{targ\}/g,"a1");
    const ov=parseOvSeg(ovStr);
    if(ov){ov.target=target;ov.locked=locked;
      if(locked)ov.coord=null;// will resolve from target token position
      S.overlays.push(ov);}
  });}
  clearSel();origState=snap();undoStack=[];$("zoom-lbl").textContent=Math.round(S.zoom*100)+"%";
  $("placeholder").style.display=S.loadedUrl?"none":"flex";
  renderAll();console.log("Loaded:",S.tokens.length-1,"tokens,",S.overlays.length,"overlays");}
// Auto-load from URL hash on page load
function loadFromHash(){const hash=location.hash.slice(1);if(hash)loadFromHashStr(hash);}
setup();loadFromHash();renderAll();
</script></body></html>
