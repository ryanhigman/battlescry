<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="version" content="0.3.91-beta"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔮 BattleScry</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

.sec{background:var(--bg5);border-radius:6px;padding:10px;border:1px solid #33302a;display:flex;flex-direction:column;gap:6px}
.sec-title{font-size:11px;color:var(--fg2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.row{display:flex;gap:4px;align-items:center}
.colors{display:flex;gap:2px;flex-wrap:wrap}

.sep{border-left:1px solid var(--border);height:20px;margin:0 1px}
#main{flex:1;display:flex;overflow:hidden}
#map-vp{flex:1;overflow:auto;background:#12100d;position:relative}
#map-container{position:relative;transform-origin:0 0}
#map-container img{position:absolute;pointer-events:none}
#map-container svg{position:absolute}
#sidebar{width:300px;border-left:1px solid var(--border);background:var(--bg3);display:flex;flex-direction:column;flex-shrink:0}
#tabs{display:flex;border-bottom:1px solid var(--border)}
#tabs button{flex:1;padding:7px 2px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;background:transparent;color:var(--fg3);border:none;border-bottom:2px solid transparent;cursor:pointer}
#tabs button.active{background:var(--bg4);color:var(--accent);border-bottom-color:var(--accent)}
#tab-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
#props-area{flex-shrink:0;padding:8px;overflow:auto;max-height:45%}
#list-area{flex:1;overflow:auto;padding:0 8px 8px;display:flex;flex-direction:column;gap:4px}
.obj-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;cursor:pointer;border:1px solid transparent;font-size:11px}
.obj-item.sel{background:#33302a;border-color:var(--accent)}
.obj-item .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.3)}
.obj-item .dot.sq{border-radius:2px}
.obj-item .info{flex:1;min-width:0}.obj-item .name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.obj-item .sub{font-size:9px;font-family:monospace;color:var(--fg3)}.obj-item .sub.moved{color:var(--accent)}

#sidebar.collapsed{display:none}

  #sidebar:not(.collapsed){transform:translateX(0)}
  #map-vp{width:100vw!important}
  #toolbar{flex-wrap:wrap;gap:4px;padding:4px 8px}
}

</div>

<script>

function c2h(c){if(!c)return"#3498db";if(c.startsWith("~"))c=c.slice(1);if(/^[0-9a-f]{3}$/i.test(c))return`#${c[0]}${c[0]}${c[1]}${c[1]}${c[2]}${c[2]}`;if(/^[0-9a-f]{6}$/i.test(c))return`#${c}`;if(c.startsWith("#"))return c;return COLORS.find(x=>x.code===c.toLowerCase())?.hex||"#3498db";}

function parseUrl(url){try{const u=new URL(url);if(!u.hostname.includes("otfbm"))return null;let bg=u.searchParams.get("bg")||"";try{bg=decodeURIComponent(bg)}catch(e){}if(bg.includes("%3A"))try{bg=decodeURIComponent(bg)}catch(e){}const P=u.pathname.split("/").filter(Boolean);let cols=26,rows=26,opts={cellSize:40,offsetX:0,offsetY:0,dark:false,noGrid:false,gridH:0},T=[],O=[],W=[];for(const part of P){const gm=part.match(/^(\d+)x(\d+)/i);if(gm){cols=+gm[1];rows=+gm[2];continue;}if(part[0]==="@"){opts=parseOpts(part);continue;}if(part[0]==="*"){const ov=parseOvSeg(part.slice(1));if(ov)O.push(ov);continue;}if(part[0]==="_"){W.push(...parseWallSeg(part.slice(1)));continue;}if(part.includes(":")&&!part.includes("-"))continue;const di=part.indexOf("-");if(di===-1)continue;const pf=part.slice(0,di),nm=decodeURIComponent(part.slice(di+1));const cm=pf.match(/^([a-z]+)(\d+)/i);if(!cm)continue;const col=l2col(cm[1].toLowerCase()),row=+cm[2]-1;let rest=pf.slice(cm[0].length),sz="M",cl="#3498db";if(rest.length&&/[TSLMHG]/.test(rest[0])){sz=rest[0];rest=rest.slice(1);}const ce=exCol(rest);if(ce)cl=ce.hex;const ti=nm.indexOf("~");T.push({id:uid(),name:ti>-1?nm.slice(0,ti):nm,col,row,size:sz,color:cl,height:0,tokenImage:ti>-1?nm.slice(ti+1):"",originalCol:col,originalRow:row});}

// STATE

// Draw curved double-arrow rotate icon at position

// Resolve overlay coordinate — locked overlays follow their target token
// Resolve token position with size offset

function ovChanged(ov){if(!origState)return false;const o=origState.overlays.find(x=>x.id===ov.id);if(!o)return true;return ov.size!==o.size||ov.color!==o.color||ov.type!==o.type||ov.under!==o.under||ov.target!==o.target||ov.aimTarget!==o.aimTarget||ov.locked!==o.locked||ov.locked2!==o.locked2||(ov.coord?.col!==o.coord?.col)||(ov.coord?.row!==o.coord?.row)||(ov.coord2?.col!==o.coord2?.col)||(ov.coord2?.row!==o.coord2?.row);}
// Rebuild a combatant's full note with updated overlay fields
function rebuildNote(name){
  const orig=S.fullNotes[name]||"";
  // Parse existing fields
  const fields={};const fieldOrder=[];
  orig.split(" | ").forEach(f=>{
    f=f.trim();const ci=f.indexOf(": ");
    if(ci>-1){const k=f.slice(0,ci).trim();const v=f.slice(ci+2).trim();
      if(!fields[k])fieldOrder.push(k);fields[k]=v;}});
  // Remove all overlay/aim fields — we'll rebuild from current state
  const ovKeys=fieldOrder.filter(k=>/^(Overlay|Aim)\d*$/.test(k));
  ovKeys.forEach(k=>{delete fields[k];fieldOrder.splice(fieldOrder.indexOf(k),1);});
  // Get overlays attached to this combatant
  const myOvs=S.overlays.filter(o=>o.target===name);
  myOvs.forEach(ov=>{
    const num=ov.ovNum||"";
    const ovKey="Overlay"+num;
    // Build overlay string
    const coord=getOvCoord(ov);const coord2=getOvCoord2(ov);
    const under=ov.under?"u":"";
    const typeCode=ov.type==="circletop"?"ct":ov.type==="circlecorner"?"co":ov.type==="squaretop"?"st":ov.type[0];
    const cl=h2c(ov.color);
    let ovStr=under+typeCode+ov.size+cl;
    const c1=ov.locked?"{targ}":(coord?fmtU(coord.col,coord.row):"");
    ovStr+=c1;
    if(coord2||ov.locked2){
      const c2=ov.locked2==="aim"?"{aim}":(coord2?fmtU(coord2.col,coord2.row):"");
      ovStr+=c2;}
    fields[ovKey]=ovStr;fieldOrder.push(ovKey);
    // Add Aim field if aim target set
    if(ov.aimTarget){const aimKey="Aim"+num;fields[aimKey]=ov.aimTarget;fieldOrder.push(aimKey);}});
  // Reconstruct note
  return fieldOrder.map(k=>k+": "+fields[k]).join(" | ");}

function renderCmd(){
  const mv=S.tokens.filter(t=>!t.hidden&&tokChanged(t));
  const ovChg=S.overlays.filter(o=>ovChanged(o));
  const removed=origState?origState.tokens.filter(ot=>!ot.hidden&&!S.tokens.find(t=>t.id===ot.id)):[];
  const ct=$("cmd-text"),btn=$("btn-copy");
  const lines=[];
  // Token move parts
  const moveParts=[];
  mv.forEach(t=>{
    const orig=origState?.tokens.find(o=>o.id===t.id);const isNew=!orig;
    const sz=isNew?(t.size!=="M"?t.size.toLowerCase():""):(t.size!==orig.size?t.size.toLowerCase():"");
    const cl=isNew?h2c(t.color):(t.color!==orig.color?h2c(t.color):"");
    const ht=isNew?(t.height?String(t.height):""):(t.height!==orig.height?String(t.height):"");
    const ti=isNew?(t.tokenImage||""):(t.tokenImage!==orig.tokenImage?t.tokenImage:"");
    const f=[t.name,fmtU(t.col,t.row),sz,cl,ht,ti];
    while(f.length>2&&f[f.length-1]==="")f.pop();moveParts.push(`-t "${f.join("|")}"`);}); 
  // Group overlay changes by target
  const ovByTarget={};
  function addToGroup(tgt,cmd){if(!ovByTarget[tgt])ovByTarget[tgt]=[];ovByTarget[tgt].push(cmd);}
  // Cleanup: reassigned/layer-changed overlays — delete from OLD target
  if(origState){ovChg.forEach(ov=>{
    const orig=origState.overlays.find(x=>x.id===ov.id);if(!orig)return;
    const targetChanged=orig.target&&orig.target!==ov.target;
    const layerChanged=orig.target&&orig.under!==ov.under&&orig.target===ov.target;
    if(targetChanged||layerChanged){
      const oldNum=orig.ovNum||"";const oldFlag=orig.under?"-under"+oldNum:"-over"+oldNum;
      addToGroup(orig.target,`${oldFlag} none -t ${qN(orig.target)}`);}});}
  // Removed overlays — delete
  const removedOvs=origState?origState.overlays.filter(oo=>!S.overlays.find(o=>o.id===oo.id)):[];
  removedOvs.forEach(oo=>{
    const sameTarget=origState.overlays.filter(o=>(o.target||"")===(oo.target||""));
    const idx=sameTarget.indexOf(oo)+1;const num=sameTarget.length>1?idx:"";
    const flag=oo.under?"-under"+num:"-over"+num;
    addToGroup(oo.target||"",`${flag} none${oo.target?" -t "+qN(oo.target):""}`);});
  // Create/update overlays
  ovChg.forEach(ov=>{const ovN=getOvNum(ov);const num=ovN.num;
    const flag=ov.under?"-under"+num:"-over"+num;const coord=getOvCoord(ov);
    const c1=ov.locked==="targ"?"{targ}":(ov.locked==="aim"?"{aim}":(coord?fmtU(coord.col,coord.row):""));
    const c2r=getOvCoord2(ov);
    const c2=ov.locked2==="targ"?",{targ}":(ov.locked2==="aim"?",{aim}":(c2r?","+fmtU(c2r.col,c2r.row):""));
    const cl=h2c(ov.color);const tgtStr=ov.target?" -t "+qN(ov.target):"";
    const aimStr=ov.aimTarget?` -aim${num} "${ov.aimTarget}|stick"`:"";
    let ovCmd;
    if(ov.type==="arrow")ovCmd=`${flag} arrow,${cl},${c1}${c2}${tgtStr}${aimStr}`;
    else if(ov.type==="line")ovCmd=`${flag} line,${ov.size||0},${ov.width||5},${cl},${c1}${c2}${tgtStr}${aimStr}`;
    else if(ov.type==="cone")ovCmd=`${flag} cone,${ov.size},${cl},${c1}${c2}${tgtStr}${aimStr}`;
    else ovCmd=`${flag} ${ov.type},${ov.size},${cl},${c1}${tgtStr}${aimStr}`;
    addToGroup(ov.target||"",ovCmd);});
  // Encode data for !bscry apply command
  function encApply(s){return s.replace(/ /g,"_").replace(/\|/g,"%7C").replace(/\{/g,"%7B").replace(/\}/g,"%7D");}
  // Split overlay groups into unattached (safe with moves) and attached (need notes)
  const unattachedParts=ovByTarget[""]||[];delete ovByTarget[""];
  const attachedTargets=Object.keys(ovByTarget);
  // Build apply data: moves::notes
  const mvData=moveParts.length?moveParts.map(p=>p.replace(/-t "/g,"").replace(/"/g,"")).join(";"):"";
  // Determine which combatants need note updates (overlay changes on attached targets)
  const noteTargets=new Set();
  attachedTargets.forEach(t=>noteTargets.add(t));
  // Also add targets of removed overlays
  removedOvs.forEach(oo=>{if(oo.target)noteTargets.add(oo.target);});
  // Also add targets of reassigned overlays (old target needs update too)
  if(origState){ovChg.forEach(ov=>{
    const orig=origState.overlays.find(x=>x.id===ov.id);
    if(orig&&orig.target&&orig.target!==ov.target)noteTargets.add(orig.target);});}
  const ntParts=[];
  noteTargets.forEach(name=>{
    const newNote=rebuildNote(name);
    ntParts.push(name.replace(/ /g,"_")+"~"+newNote);});
  const ntData=ntParts.join(";;");
  // Build output
  if(ntData){
    // Use !bscry apply for full round-trip
    const applyData=encApply(mvData+"::"+ntData);
    lines.push("!bscry apply "+applyData);
    // Add raw !map for unattached overlays only
    if(unattachedParts.length)lines.push("!map "+unattachedParts.join(" "));
  }else{
    // No attached overlay changes — simple !map
    const allParts=[...moveParts,...unattachedParts];
    if(allParts.length)lines.push("!map "+allParts.join(" "));
  }
  // !i note commands for removed tokens
  removed.forEach(rt=>{
    const props=[];
    if(rt.size&&rt.size!=="M")props.push("Size: "+rt.size);
    const cc=h2c(rt.color);if(cc&&cc!=="b"&&cc!=="r")props.push("Color: "+cc);
    if(rt.tokenImage)props.push("Token: "+rt.tokenImage);
    lines.push("!i note "+qN(rt.name)+(props.length?" "+props.join(" | "):""));});
  if(!lines.length){ct.textContent="No changes";ct.style.color="var(--fg4)";btn.textContent="Copy Command";}
  else{
  const warns=[];
  // 10 overlay total limit
  if(S.overlays.length>10)warns.push("⚠ Map has "+S.overlays.length+" overlays — OTFBM limit is 10 total");
  const unassigned=ovChg.filter(o=>!o.target);
  if(unassigned.length){
    const names=unassigned.map(o=>{const n=getOvNum(o);return n.label+": "+o.type;}).join(", ");
    warns.push("⚠ "+names+" not assigned — will not persist");}
  ct.innerHTML=`<div style="color:var(--fg)">${lines.join("\n")}</div>${warns.length?`<div style="color:#e74c3c;font-size:10px;margin-top:4px">${warns.join("<br>")}</div>`:""}`;
  const total=mv.length+ovChg.length+removed.length;
  btn.textContent=mv.length>MAX_MV?`⚠ ${mv.length}/${MAX_MV}! Copy`:`Copy (${total} change${total>1?"s":""})`;}
  // Update Revert All button state
  const rb=$("btn-revert");if(rb){const hc=hasAnyChanges();rb.disabled=!hc;rb.style.opacity=hc?1:.4;rb.style.cursor=hc?"pointer":"default";}
  // Update Undo button state
  const ub=$("btn-undo");if(ub){const hu=undoStack.length>0;ub.disabled=!hu;ub.style.opacity=hu?1:.4;ub.style.cursor=hu?"pointer":"default";}}

// Check if cell is within overlay area
// Point-in-triangle test using cross products
function ptInTri(px,py,v1x,v1y,v2x,v2y,v3x,v3y){
  const d1=(px-v2x)*(v1y-v2y)-(v1x-v2x)*(py-v2y);
  const d2=(px-v3x)*(v2y-v3y)-(v2x-v3x)*(py-v3y);
  const d3=(px-v1x)*(v3y-v1y)-(v3x-v1x)*(py-v1y);
  return !((d1<0||d2<0||d3<0)&&(d1>0||d2>0||d3>0));}
function ovCoversCell(ov,col,row){
  const coord=getOvCoord(ov);if(!coord)return false;
  const g=S.grid,cs=g.cellSize,ox=g.offsetX,oy=g.offsetY;
  const cellCx=ox+col*cs+cs/2,cellCy=oy+row*cs+cs/2;
  if(ov.type.startsWith("circle")){
    const r=(ov.size/5)*cs;let p;
    if(ov.type==="circle")p={x:ox+coord.col*cs+cs/2,y:oy+coord.row*cs+cs/2};
    else if(ov.type==="circletop")p={x:ox+coord.col*cs+r,y:oy+coord.row*cs+r};
    else p={x:ox+coord.col*cs,y:oy+coord.row*cs};// circlecorner
    const dx=cellCx-p.x,dy=cellCy-p.y;return Math.sqrt(dx*dx+dy*dy)<=r+cs/2;}
  if(ov.type.startsWith("square")){const _c2=getOvCoord2(ov);
    if(_c2){
      const sc={x:ox+coord.col*cs+cs/2,y:oy+coord.row*cs+cs/2};
      const ac={x:ox+_c2.col*cs+cs/2,y:oy+_c2.row*cs+cs/2};
      const aimA=Math.atan2(ac.y-sc.y,ac.x-sc.x),snA=Math.round(aimA/(Math.PI/4))*(Math.PI/4);
      const sp={x:sc.x+Math.round(Math.cos(snA))*cs/2,y:sc.y+Math.round(Math.sin(snA))*cs/2};
      const a=Math.atan2(ac.y-sp.y,ac.x-sp.x),sz=(ov.size/5)*cs;
      const dx=Math.cos(a),dy=Math.sin(a),px=Math.cos(a+Math.PI/2),py=Math.sin(a+Math.PI/2);
      const nl={x:sp.x-sz/2*px,y:sp.y-sz/2*py},nr={x:sp.x+sz/2*px,y:sp.y+sz/2*py};
      const fl={x:nl.x+sz*dx,y:nl.y+sz*dy},fr={x:nr.x+sz*dx,y:nr.y+sz*dy};
      return ptInTri(cellCx,cellCy,nl.x,nl.y,nr.x,nr.y,fr.x,fr.y)||ptInTri(cellCx,cellCy,nl.x,nl.y,fr.x,fr.y,fl.x,fl.y);
    }
    const spx=ox+coord.col*cs,spy=oy+coord.row*cs,sz=(ov.size/5)*cs;
    return cellCx>=spx-cs/2&&cellCx<=spx+sz+cs/2&&cellCy>=spy-cs/2&&cellCy<=spy+sz+cs/2;}
  if(ov.type==="cone"){const _c2=getOvCoord2(ov);if(!_c2)return false;
    const sc={x:ox+coord.col*cs+cs/2,y:oy+coord.row*cs+cs/2};
    const ac={x:ox+_c2.col*cs+cs/2,y:oy+_c2.row*cs+cs/2};
    const aimA=Math.atan2(ac.y-sc.y,ac.x-sc.x);
    const snA=Math.round(aimA/(Math.PI/4))*(Math.PI/4);
    const p1x=sc.x+Math.round(Math.cos(snA))*cs/2,p1y=sc.y+Math.round(Math.sin(snA))*cs/2;
    const a=Math.atan2(ac.y-p1y,ac.x-p1x),l=(ov.size/5)*cs;
    const bx=p1x+l*Math.cos(a),by=p1y+l*Math.sin(a),hw=l/2;
    const px=Math.cos(a+Math.PI/2),py=Math.sin(a+Math.PI/2);
    return ptInTri(cellCx,cellCy,p1x,p1y,bx+hw*px,by+hw*py,bx-hw*px,by-hw*py);}
  if((ov.type==="line"||ov.type==="arrow")){const _c2=getOvCoord2(ov);if(!_c2)return false;
    const x1=ox+coord.col*cs+cs/2,y1=oy+coord.row*cs+cs/2;
    const x2=ox+_c2.col*cs+cs/2,y2=oy+_c2.row*cs+cs/2;
    const dx=x2-x1,dy=y2-y1,len2=dx*dx+dy*dy;
    if(len2===0)return Math.sqrt((cellCx-x1)**2+(cellCy-y1)**2)<=cs/2;
    let t=((cellCx-x1)*dx+(cellCy-y1)*dy)/len2;t=Math.max(0,Math.min(1,t));
    const nx=x1+t*dx,ny=y1+t*dy,dist=Math.sqrt((cellCx-nx)**2+(cellCy-ny)**2);
    const halfW=ov.type==="line"?(ov.width||1)/5*cs/2:cs*.2;
    return dist<=halfW+cs/2;}
  if(coord.col===col&&coord.row===row)return true;
  const _c2f=getOvCoord2(ov);if(_c2f&&_c2f.col===col&&_c2f.row===row)return true;
  return false;}
function overlaysAtArea(col,row){return S.overlays.filter(ov=>ovCoversCell(ov,col,row));}

// TOOLTIP
// Get all tokens and overlays under a screen point (pixel-accurate)
function objectsAtPoint(clientX,clientY){
  const els=document.elementsFromPoint(clientX,clientY);
  const tokIds=new Set(),ovIds=new Set();
  els.forEach(el=>{
    const tid=el.closest?.("[data-tid]");if(tid)tokIds.add(+tid.dataset.tid);
    const oid=el.closest?.("[data-oid]");if(oid)ovIds.add(+oid.dataset.oid);
    const aim=el.closest?.("[data-aim]");if(aim)ovIds.add(+aim.dataset.aim);
    const rsz=el.closest?.("[data-rsz]");if(rsz)ovIds.add(+rsz.dataset.rsz);
    const mc=el.closest?.("[data-movecoord]");if(mc)ovIds.add(+mc.dataset.movecoord);
    const wr=el.closest?.("[data-widthrsz]");if(wr)ovIds.add(+wr.dataset.widthrsz);});
  const toks=S.tokens.filter(t=>tokIds.has(t.id));
  const ovs=S.overlays.filter(o=>ovIds.has(o.id));
  return{toks,ovs};}
function showTT(e){const tt=$("tooltip"),svg=$("map-svg"),rect=svg.getBoundingClientRect();
  const x=(e.clientX-rect.left)/S.zoom-PAD,y=(e.clientY-rect.top)/S.zoom-PAD;
  const g=S.grid,col=Math.floor((x-g.offsetX)/g.cellSize),row=Math.floor((y-g.offsetY)/g.cellSize);
  if(col<0||col>=g.cols||row<0||row>=g.rows){tt.style.display="none";return;}
  let text=fmtU(col,row);
  // Pixel-accurate hit detection
  const hits=objectsAtPoint(e.clientX,e.clientY);
  if(hits.toks.length) text+=": "+hits.toks.map(t=>{let s=t.name+" ("+t.size+")";if(t.height)s+=` ↕${t.height}'`;return s;}).join(", ");
  if(hits.ovs.length){if(hits.toks.length)text+=", ";else text+=": ";text+=hits.ovs.map(o=>{const n=getOvNum(o);return`[${n.label}: ${o.type}${o.size?" "+o.size+"'":""}${o.target?" → "+o.target:""}${o.locked?" 🔗":""}]`;}).join(", ");}
  tt.textContent=text;tt.style.display="block";tt.style.left=(e.clientX+14)+"px";tt.style.top=(e.clientY-10)+"px";}

    // Merge with existing selection if mergeMode
    const allIds=new Set(mergeMode?[...S.sel.ids,...newTokIds,...newOvIds]:[...newTokIds,...newOvIds]);
    // Remove unchecked items from this popup (deselect)
    if(mergeMode){const unchecked=[...pp.querySelectorAll('input[value]:not(:checked)')].map(c=>+c.value);unchecked.forEach(id=>allIds.delete(id));}
    if(!allIds.size){clearSel();}
    else{const hasTok=S.tokens.some(t=>allIds.has(t.id));const hasOv=S.overlays.some(o=>allIds.has(o.id));

function setup(){

      if(targIdx<aimIdx){locked1="targ";locked2="aim";}
      else{locked1="aim";locked2="targ";}
    }else if(hasTarg){// Only {targ}: check if it's at end (coord2) or before another coord (coord1)
      const afterTarg=ovStr.slice(targIdx+6).trim();
      locked1=/[a-zA-Z]\d/.test(afterTarg)?"targ":false;
      locked2=locked1?false:"targ";
    }else if(hasAim){const afterAim=ovStr.slice(aimIdx+5).trim();
      locked1=/[a-zA-Z]\d/.test(afterAim)?"aim":false;
      locked2=locked1?false:"aim";}
    ovStr=ovStr.replace(/\{targ\}/g,"a1").replace(/\{aim\}/g,"a1");
    const ov=parseOvSeg(ovStr);
    if(ov){ov.target=target;ov.locked=locked1;ov.locked2=locked2;ov.aimTarget="";
      if(locked1)ov.coord=null;
      if(locked2)ov.coord2=null;
      S.overlays.push(ov);}
  });}
  assignOvNums();// Assign stable overlay numbers per target group
  // Build combatants list: all tokens (excluding hidden DM) + unplaced from np=
  S.combatants=S.tokens.filter(t=>!t.hidden).map(t=>({name:t.name,placed:true}));
  if(params.np){params.np.split(";").forEach(n=>{
    const name=n.trim().replace(/_/g," ");if(!name)return;
    if(!S.combatants.find(c=>c.name===name))S.combatants.push({name,placed:false});});}
  // Parse full notes for round-trip (fn=Name~note;;Name2~note2)
  S.fullNotes={};
  if(params.fn){params.fn.split(";;").forEach(entry=>{
    const ti=entry.indexOf("~");if(ti===-1)return;
    const name=entry.slice(0,ti).replace(/_/g," ");
    const note=entry.slice(ti+1);
    S.fullNotes[name]=note;});}
  // Always ensure DM is in combatants
  if(!S.combatants.find(c=>c.name==="DM"))S.combatants.push({name:"DM",placed:false});
  origState=snap();undoStack=[];$("zoom-lbl").textContent=Math.round(S.zoom*100)+"%";
  // Auto-select first visible token (sorted by color then name)
  const _cn=hex=>{const n=h2c(hex);const names={r:"red",b:"blue",g:"green",y:"yellow",pk:"pink",p:"purple",c:"cyan",bn:"brown",o:"orange",w:"white",bk:"black"};return names[n]||n||"zzz";};
  const sortedFirst=[...S.tokens.filter(t=>!t.hidden)].sort((a,b)=>{const ca=_cn(a.color),cb=_cn(b.color);if(ca!==cb)return natSort(ca,cb);return natSort(a.name,b.name);});
  const firstTok=sortedFirst[0];
  if(firstTok)S.sel={type:"token",ids:new Set([firstTok.id])};
  else if(S.overlays.length)S.sel={type:"overlay",ids:new Set([S.overlays[0].id])};
  $("placeholder").style.display=S.loadedUrl?"none":"flex";
  renderAll();console.log("Loaded:",S.tokens.length-1,"tokens,",S.overlays.length,"overlays,",S.combatants.filter(c=>!c.placed).length,"unplaced combatants");}
